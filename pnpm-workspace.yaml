packages:
  - 'apps/*'
  - 'packages/*'

# Dependencies that ship native binaries / codegen via install scripts
# (pnpm blocks these by default).
allowBuilds:
  esbuild: true
  prisma: true
  '@prisma/client': true
  '@prisma/engines': true

onlyBuiltDependencies:
  - esbuild
  - prisma
  - '@prisma/client'
  - '@prisma/engines'
